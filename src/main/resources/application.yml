spring:
  application:
    name: direct-charge
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/directchargedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  api-key: ${APP_API_KEY:default-key}

server:
  port: 8081

logging:
  level:
    com.itex.directcharge: DEBUG
    org.springframework.web: INFO

itexpay:
  base-url: https://staging.itexpay.com/api/v1
  public-key: ${ITEXPAY_PUBLIC_KEY}
  private-key: ${ITEXPAY_PRIVATE_KEY}
  encryption-key: ${ITEXPAY_ENCRYPTION_KEY}
