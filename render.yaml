services:
  - type: web
    name: direct-charge-service
    env: docker
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_API_KEY
        generateValue: true
      - key: ITEXPAY_PUBLIC_KEY
        sync: false
      - key: ITEXPAY_PRIVATE_KEY
        sync: false
      - key: ITEXPAY_ENCRYPTION_KEY
        sync: false
